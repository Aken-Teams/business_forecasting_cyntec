server {
    listen 80;
    server_name your-domain.com;  # 替換為您的域名或IP
    
    # 設置根目錄
    root /path/to/your/business_forecasting;  # 替換為您的實際路徑
    
    # 主要應用代理
    location / {
        proxy_pass http://127.0.0.1:12026;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用緩存HTML頁面
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
        proxy_no_cache $cookie_nocache $arg_nocache$arg_comment;
    }
    
    # 靜態資源處理
    location /static/ {
        alias /path/to/your/business_forecasting/static/;  # 替換為您的實際路徑
        
        # 設置靜態資源緩存策略
        location ~* \.(css|js)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            add_header Vary "Accept-Encoding";
        }
        
        location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
            expires 24h;
            add_header Cache-Control "public, max-age=86400";
            add_header Vary "Accept-Encoding";
        }
        
        # 其他靜態文件不緩存
        location ~* \.(html|htm|txt|xml)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }
    }
    
    # 上傳文件處理
    location /uploads/ {
        alias /path/to/your/business_forecasting/uploads/;  # 替換為您的實際路徑
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 處理結果文件
    location /processed/ {
        alias /path/to/your/business_forecasting/processed/;  # 替換為您的實際路徑
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 日誌設置
    access_log /var/log/nginx/business_forecasting_access.log;
    error_log /var/log/nginx/business_forecasting_error.log;
}
