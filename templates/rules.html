<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>規則管理 - FORECAST 數據處理系統</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo/forecast-analytics.png') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body {
            background: #e6e3de;
            min-height: 100vh;
        }

        .rules-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 頁面標題區 */
        .page-title-bar {
            background: white;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title-bar h2 {
            font-size: 1.3rem;
            color: #2c3e50;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title-bar h2 i {
            color: #e74c3c;
        }

        .btn-back {
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.4);
            color: white;
        }

        /* 說明區塊 */
        .info-banner {
            background: white;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.06);
            border-left: 4px solid #e74c3c;
        }

        .info-banner h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2c3e50;
        }

        .info-banner h3 i {
            color: #e74c3c;
        }

        .info-banner p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* 客戶卡片網格 */
        .customer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .customer-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            min-height: 280px;
        }

        .customer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .customer-card-header {
            padding: 25px;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .customer-card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            transform: rotate(30deg);
        }

        .customer-card.quanta .customer-card-header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .customer-card.pegatron .customer-card-header {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
        }

        .customer-card.default .customer-card-header {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        .customer-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .customer-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .customer-company {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .customer-card-body {
            padding: 20px 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .rule-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .rule-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rule-badge.erp {
            background: #e8f4fc;
            color: #2980b9;
        }

        .rule-badge.transit {
            background: #e8f8f0;
            color: #27ae60;
        }

        .rule-badge.forecast {
            background: #fce8e8;
            color: #c0392b;
        }

        .rule-badge i {
            font-size: 0.7rem;
        }

        .customer-card-footer {
            padding: 15px 25px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .view-rules-btn {
            color: #3498db;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .view-rules-btn:hover {
            color: #2980b9;
        }

        .rule-count {
            color: #888;
            font-size: 0.85rem;
        }

        /* 模態框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 0;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 16px 16px 0 0;
            height: 60px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: stretch;
        }

        .modal-header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 25px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .modal-header-title svg {
            width: 22px;
            height: 22px;
            fill: white;
            flex-shrink: 0;
        }

        .modal-close {
            width: 60px;
            height: 60px;
            border: none;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            transition: background 0.3s;
            border-radius: 0 16px 0 0;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .modal-body {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* 規則類別區塊 */
        .rule-category-section {
            margin-bottom: 30px;
        }

        .rule-category-section:last-child {
            margin-bottom: 0;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        /* 類別圖標顏色 - 按處理流程順序 */
        .category-icon.upload { background: linear-gradient(135deg, #17a2b8 0%, #138496 100%); }
        .category-icon.cleanup { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); }
        .category-icon.mapping { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); }
        .category-icon.erp { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        .category-icon.transit { background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%); }
        .category-icon.forecast { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
        .category-icon.output { background: linear-gradient(135deg, #6f42c1 0%, #5a32a3 100%); }

        .category-title {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .rule-item {
            background: white;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .rule-item:last-child {
            margin-bottom: 0;
        }

        .rule-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .rule-item-title {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.05rem;
        }

        .rule-item-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .rule-item-status.active {
            background: #d4edda;
            color: #155724;
        }

        .rule-item-status.inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .rule-item-body {
            padding: 20px;
        }

        .rule-item-desc {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #ddd;
            text-align: center;
        }

        .rule-config-table {
            width: 100%;
            border-collapse: collapse;
        }

        .rule-config-table tr {
            border-bottom: 1px solid #f0f0f0;
        }

        .rule-config-table tr:last-child {
            border-bottom: none;
        }

        .rule-config-table th {
            text-align: left;
            padding: 10px 15px;
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
            font-size: 0.85rem;
            width: 140px;
            vertical-align: top;
            white-space: nowrap;
        }

        .rule-config-table td {
            padding: 10px 15px;
            color: #333;
            font-size: 0.9rem;
            vertical-align: top;
            text-align: left;
        }

        .rule-config-table td code {
            background: #e8f4f8;
            color: #2980b9;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 8px;
            display: inline-block;
            margin-bottom: 4px;
            border: 1px solid #bde0eb;
        }

        .rule-config-table td .config-list {
            margin: 0;
            padding-left: 0;
            list-style: none;
            color: #333;
        }

        .rule-config-table td .config-list li {
            margin-bottom: 6px;
            line-height: 1.6;
            padding: 2px 0;
            padding-left: 15px;
            position: relative;
        }

        .rule-config-table td .config-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #3498db;
            font-weight: bold;
        }

        .rule-config-table td .config-list li:last-child {
            margin-bottom: 0;
        }

        .rule-config-table td .config-list li strong {
            color: #2c3e50;
            margin-right: 5px;
        }

        /* 物件陣列樣式（用於清理規則等） */
        .config-object-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .config-object-item {
            padding-left: 16px;
            position: relative;
        }

        .config-object-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 6px;
            width: 6px;
            height: 6px;
            background: #3498db;
            border-radius: 50%;
        }

        .config-object-row {
            display: block;
            margin-bottom: 4px;
            line-height: 1.6;
            font-size: 0.9rem;
        }

        .config-object-row:last-child {
            margin-bottom: 0;
        }

        .config-object-row .config-label {
            color: #666;
            font-weight: 600;
        }

        .config-object-row .config-value {
            color: #2c3e50;
        }

        .config-highlight {
            background: #fff3cd;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            color: #856404;
        }

        /* 上傳步驟樣式 */
        .upload-steps-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .upload-step-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .upload-step-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .upload-step-item:first-child {
            padding-top: 0;
        }

        .upload-step-number {
            width: 32px;
            height: 32px;
            min-width: 32px;
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .upload-step-content {
            flex: 1;
        }

        .upload-step-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95rem;
            margin-bottom: 4px;
            text-align: left;
        }

        .upload-step-desc {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: left;
        }

        .upload-step-meta {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        .upload-step-tag {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .upload-step-tag.file-type {
            background: #e8f4f8;
            color: #2980b9;
        }

        .upload-step-tag.required {
            background: #ffeeba;
            color: #856404;
        }

        .upload-step-tag.auto {
            background: #d4edda;
            color: #155724;
        }

        .upload-step-tag.output {
            background: #d1ecf1;
            color: #0c5460;
        }

        .upload-step-tag.validation {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* 規則說明區塊 */
        .rules-intro {
            padding: 0 0 20px 0;
            margin-bottom: 20px;
            border-bottom: 1px dashed #ddd;
        }

        .rules-intro-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: #555;
            font-size: 0.9rem;
        }

        .rules-intro-header i {
            color: #3498db;
        }

        .rules-intro-files {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .rules-intro-files .file-tag {
            background: #e8f4f8;
            color: #2980b9;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .rules-intro-files .file-tag i {
            font-size: 0.8rem;
        }

        /* Toast 通知 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success i { color: #27ae60; }
        .toast.error i { color: #e74c3c; }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #bc773e;
            font-size: 0.9rem;
            margin-top: 40px;
            border-top: 2px solid #d4cbc4;
        }

        /* 載入動畫 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .loading i {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .customer-grid {
                grid-template-columns: 1fr;
            }

            .page-title-bar {
                flex-direction: column;
                gap: 15px;
            }

            .modal-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="rules-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-logo">
                        <img src="{{ url_for('static', filename='logo/logo.png') }}" alt="FORECAST Logo" class="logo-image">
                    </div>
                    <div class="header-text">
                        <h1>處理規則管理</h1>
                        <p class="header-subtitle">管理各客戶的資料處理規則配置</p>
                    </div>
                </div>
                <div class="header-user">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span class="user-name">{{ user.display_name }}</span>
                        <span class="user-role">(管理者)</span>
                    </div>
                    <a href="/admin" class="logout-btn" style="background: #6c757d;">
                        <i class="fas fa-arrow-left"></i> 返回
                    </a>
                </div>
            </div>
        </header>

        <!-- 說明區塊 -->
        <div class="info-banner">
            <h3><i class="fas fa-info-circle"></i> 關於處理規則</h3>
            <p>此頁面顯示各客戶的資料處理規則配置。每位客戶可能有不同的 ERP 淨需求、在途資料處理方式，以及 Forecast 匹配邏輯。點擊客戶卡片可查看詳細的處理規則說明。</p>
        </div>

        <!-- 客戶卡片 -->
        <div id="customerContent">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>載入客戶資料中...</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2025 智合科技，FORECAST 數據處理系統. 智能預測，精準分析.</p>
        </footer>
    </div>

    <!-- 規則詳情模態框 -->
    <div class="modal-overlay" id="rulesModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-title">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    <span id="modalCustomerName">客戶規則</span>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 動態內容 -->
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 瀏覽器檢測腳本 -->
    <script src="{{ url_for('static', filename='js/browser-check.js') }}?v={{ version }}"></script>

    <script>
        let allRules = [];
        let customers = [];
        let customerRulesCache = {}; // 快取每個客戶的規則

        // 頁面載入
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });

        // 載入資料
        async function loadData() {
            try {
                // 載入客戶列表
                const customersRes = await fetch('/api/admin/users');
                const customersData = await customersRes.json();

                if (customersData.success) {
                    // 只取一般用戶（有處理規則的）
                    customers = customersData.users.filter(u => u.role === 'user');
                }

                // 載入所有規則（用於統計）
                const rulesRes = await fetch('/api/admin/rules');
                const rulesData = await rulesRes.json();
                if (rulesData.success) {
                    allRules = rulesData.rules;
                    // 按用戶分組規則數量
                    customers.forEach(c => {
                        c.ruleCount = allRules.filter(r => r.user_id === c.id).length;
                    });
                }

                renderCustomerCards();
            } catch (error) {
                console.error('載入失敗:', error);
                showToast('載入資料失敗', 'error');
            }
        }

        // 渲染客戶卡片
        function renderCustomerCards() {
            const container = document.getElementById('customerContent');

            if (customers.length === 0) {
                container.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-users" style="animation: none; color: #ddd;"></i>
                        <p>目前沒有客戶資料</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="customer-grid">';

            customers.forEach(customer => {
                const cardClass = getCustomerCardClass(customer.company);
                const ruleCount = customer.ruleCount || 0;
                const hasRules = ruleCount > 0;

                html += `
                    <div class="customer-card ${cardClass}" onclick="showCustomerRules(${customer.id}, '${escapeHtml(customer.display_name)}', '${escapeHtml(customer.company)}')">
                        <div class="customer-card-header">
                            <div class="customer-icon">
                                <i class="fas fa-building"></i>
                            </div>
                            <div class="customer-name">${escapeHtml(customer.display_name)}</div>
                            <div class="customer-company">${escapeHtml(customer.company || '未設定公司')}</div>
                        </div>
                        <div class="customer-card-body">
                            <div class="rule-summary">
                                ${hasRules ? `
                                    <span class="rule-badge erp"><i class="fas fa-circle"></i> ERP 處理</span>
                                    <span class="rule-badge transit"><i class="fas fa-circle"></i> 在途處理</span>
                                    <span class="rule-badge forecast"><i class="fas fa-circle"></i> Forecast</span>
                                ` : `
                                    <span style="color: #999; font-size: 0.9rem;">尚未設定處理規則</span>
                                `}
                            </div>
                        </div>
                        <div class="customer-card-footer">
                            <span class="view-rules-btn">
                                <i class="fas fa-eye"></i> ${hasRules ? '查看詳細規則' : '尚無規則'}
                            </span>
                            <span class="rule-count">${ruleCount} 項規則</span>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // 根據公司名稱決定卡片樣式
        function getCustomerCardClass(company) {
            if (!company) return 'default';
            const lower = company.toLowerCase();
            if (lower.includes('廣達') || lower.includes('quanta')) return 'quanta';
            if (lower.includes('和碩') || lower.includes('pegatron')) return 'pegatron';
            return 'default';
        }

        // 顯示客戶規則
        async function showCustomerRules(userId, customerName, company) {
            document.getElementById('modalCustomerName').textContent = `${customerName} - 處理規則`;
            document.getElementById('modalBody').innerHTML = `
                <div class="loading" style="padding: 40px;">
                    <i class="fas fa-spinner"></i>
                    <p>載入規則中...</p>
                </div>
            `;
            document.getElementById('rulesModal').classList.add('active');
            document.body.style.overflow = 'hidden';

            try {
                // 載入該客戶的規則
                const response = await fetch(`/api/admin/rules?user_id=${userId}`);
                const data = await response.json();

                if (!data.success) {
                    document.getElementById('modalBody').innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #e74c3c;">
                            <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                            <p>載入規則失敗: ${data.message}</p>
                        </div>
                    `;
                    return;
                }

                const customerRules = data.rules;

                if (customerRules.length === 0) {
                    document.getElementById('modalBody').innerHTML = `
                        <div style="text-align: center; padding: 60px; color: #888;">
                            <i class="fas fa-inbox" style="font-size: 4rem; margin-bottom: 20px; color: #ddd;"></i>
                            <h3 style="color: #666; margin-bottom: 10px;">尚未設定處理規則</h3>
                            <p>此客戶目前沒有任何處理規則配置</p>
                        </div>
                    `;
                    return;
                }

                // 按類別分組規則（按實際處理流程順序）
                // 1. 上傳 -> 2. 清理 -> 3. 映射 -> 4. ERP -> 5. Transit -> 6. Forecast -> 7. 輸出
                const categories = {
                    'upload': { name: '階段一：上傳文件', icon: 'cloud-upload-alt', rules: [] },
                    'cleanup': { name: '階段二：資料清理', icon: 'broom', rules: [] },
                    'mapping': { name: '階段三：客戶映射', icon: 'project-diagram', rules: [] },
                    'erp': { name: '階段四：ERP 淨需求處理', icon: 'database', rules: [] },
                    'transit': { name: '階段五：在途資料處理', icon: 'shipping-fast', rules: [] },
                    'forecast': { name: '階段六：Forecast 處理', icon: 'chart-line', rules: [] },
                    'output': { name: '階段七：輸出與下載', icon: 'download', rules: [] }
                };

                customerRules.forEach(rule => {
                    if (categories[rule.rule_category]) {
                        categories[rule.rule_category].rules.push(rule);
                    }
                });

                // 根據有哪些規則類別來判斷需要上傳哪些文件
                const fileTypes = [];
                if (categories.erp.rules.length > 0) fileTypes.push({ name: 'ERP 淨需求', icon: 'file-excel' });
                if (categories.transit.rules.length > 0) fileTypes.push({ name: '在途資料', icon: 'file-excel' });
                if (categories.forecast.rules.length > 0) fileTypes.push({ name: 'Forecast', icon: 'file-excel' });

                // 生成說明區塊
                let html = `
                    <div class="rules-intro">
                        <div class="rules-intro-header">
                            <i class="fas fa-info-circle"></i>
                            <span>此客戶需上傳以下文件，系統依據下方規則進行處理</span>
                        </div>
                        <div class="rules-intro-files">
                            ${fileTypes.map(f => `<span class="file-tag"><i class="fas fa-${f.icon}"></i> ${f.name}</span>`).join('')}
                        </div>
                    </div>
                `;

                for (const [key, category] of Object.entries(categories)) {
                    if (category.rules.length > 0) {
                        html += `
                            <div class="rule-category-section">
                                <div class="category-header">
                                    <div class="category-icon ${key}">
                                        <i class="fas fa-${category.icon}"></i>
                                    </div>
                                    <span class="category-title">${category.name}</span>
                                </div>
                        `;

                        category.rules.forEach(rule => {
                            html += renderRuleItem(rule);
                        });

                        html += '</div>';
                    }
                }

                document.getElementById('modalBody').innerHTML = html;

            } catch (error) {
                console.error('載入客戶規則失敗:', error);
                document.getElementById('modalBody').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #e74c3c;">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                        <p>載入規則失敗，請稍後再試</p>
                    </div>
                `;
            }
        }

        // 渲染規則項目
        function renderRuleItem(rule) {
            const config = rule.rule_config || {};
            let configHtml = renderConfigDetails(config);

            return `
                <div class="rule-item">
                    <div class="rule-item-header">
                        <span class="rule-item-title">${escapeHtml(rule.rule_name)}</span>
                        <span class="rule-item-status ${rule.is_active ? 'active' : 'inactive'}">
                            ${rule.is_active ? '啟用中' : '已停用'}
                        </span>
                    </div>
                    <div class="rule-item-body">
                        ${rule.rule_description ? `<div class="rule-item-desc">${escapeHtml(rule.rule_description)}</div>` : ''}
                        ${configHtml}
                    </div>
                </div>
            `;
        }

        // 渲染配置詳情
        function renderConfigDetails(config) {
            if (!config || Object.keys(config).length === 0) {
                return '<p style="color: #999; text-align: center; margin: 0;">無詳細配置</p>';
            }

            // 特別處理上傳步驟
            if (config.upload_steps && Array.isArray(config.upload_steps)) {
                return renderUploadSteps(config.upload_steps, 'upload');
            }

            // 特別處理輸出步驟
            if (config.output_steps && Array.isArray(config.output_steps)) {
                return renderUploadSteps(config.output_steps, 'output');
            }

            let html = '<table class="rule-config-table">';
            for (const [key, value] of Object.entries(config)) {
                html += `<tr>`;
                html += `<th>${formatKey(key)}</th>`;
                html += `<td>${formatValue(value)}</td>`;
                html += `</tr>`;
            }
            html += '</table>';
            return html;
        }

        // 渲染步驟列表（支援 upload 和 output 類型）
        function renderUploadSteps(steps, type = 'upload') {
            // 根據類型決定步驟數字的顏色
            const numberColorMap = {
                'upload': 'linear-gradient(135deg, #17a2b8 0%, #138496 100%)',
                'output': 'linear-gradient(135deg, #6f42c1 0%, #5a32a3 100%)'
            };
            const numberBg = numberColorMap[type] || numberColorMap['upload'];

            let html = '<div class="upload-steps-list">';
            steps.forEach(step => {
                const stepNum = step.step || '';
                const name = step.name || '';
                const desc = step.description || '';

                // 構建標籤
                let tags = '';
                if (step.file_type) {
                    tags += `<span class="upload-step-tag file-type"><i class="fas fa-file"></i> ${escapeHtml(step.file_type)}</span>`;
                }
                if (step.required) {
                    tags += `<span class="upload-step-tag required"><i class="fas fa-asterisk"></i> 必要</span>`;
                }
                if (step.validation && !step.auto) {
                    tags += `<span class="upload-step-tag validation"><i class="fas fa-check-circle"></i> 格式驗證</span>`;
                }
                if (step.auto) {
                    tags += `<span class="upload-step-tag auto"><i class="fas fa-magic"></i> 自動執行</span>`;
                }
                if (step.output) {
                    tags += `<span class="upload-step-tag output"><i class="fas fa-download"></i> 輸出結果</span>`;
                }

                html += `
                    <div class="upload-step-item">
                        <div class="upload-step-number" style="background: ${numberBg};">${stepNum}</div>
                        <div class="upload-step-content">
                            <div class="upload-step-name">${escapeHtml(name)}</div>
                            <div class="upload-step-desc">${escapeHtml(desc)}</div>
                            ${tags ? `<div class="upload-step-meta">${tags}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        // 格式化鍵名
        function formatKey(key) {
            const keyMap = {
                // 基本欄位
                'match_keys': '匹配欄位',
                'source_columns': '來源欄位',
                'description': '說明',
                'date_field': '日期欄位',
                'breakpoint_field': '斷點欄位',
                'default_breakpoint': '預設斷點',
                'eta_field': 'ETA 欄位',
                'default_eta': '預設 ETA',
                'week_calculation': '週期計算',
                'eta_formats': 'ETA 格式',
                'source_field': '來源欄位',
                'multiplier': '乘數',
                'example': '範例',
                'date_formats': '日期格式',
                'block_identification': '區塊識別',
                'data_range': '資料範圍',
                'column_finding': '欄位定位',
                'row_finding': '行定位',
                'accumulation_logic': '累加邏輯',
                'mapping_fields': '映射欄位',
                'unique_key': '唯一鍵',
                'cleanup_rules': '清理規則',
                // 區塊識別相關
                'method': '方法',
                'primary_key': '主鍵',
                'secondary_key': '次要鍵',
                // 資料範圍相關
                'date_columns': '日期欄位範圍',
                'start_date_row': '起始日期行',
                'end_date_row': '結束日期行',
                'target_row_marker': '目標行標記',
                // 欄位定位相關
                'scan_range': '掃描範圍',
                'date_range_check': '日期範圍檢查',
                // 行定位相關
                'marker': '標記',
                // 累加邏輯相關
                'rule': '規則',
                // 清理規則相關
                'action': '動作',
                'condition': '條件',
                'name': '名稱',
                'purpose': '目的',
                // 上傳流程相關
                'upload_steps': '上傳步驟',
                'step': '步驟',
                'file_type': '檔案類型',
                'required': '必要',
                'auto': '自動執行',
                'output': '輸出檔案',
                // 輸出流程相關
                'output_steps': '輸出步驟',
                // 其他
                'erp_fill': 'ERP 填入',
                'transit_fill': '在途填入',
                'final_result': '最終結果'
            };
            return keyMap[key] || key.replace(/_/g, ' ');
        }

        // 格式化值（將特殊格式轉換為易讀格式）
        function formatDisplayValue(val) {
            if (typeof val !== 'string') return escapeHtml(String(val));

            // 處理特殊格式
            let formatted = val;

            // 處理 "資料區塊起始行 + N" 格式
            formatted = formatted.replace(/資料區塊起始行\s*\+\s*(\d+)/g, '資料區塊起始行 + $1');

            // 處理欄位範圍 L~AW 等
            formatted = formatted.replace(/([A-Z])~([A-Z]{1,2})\s*欄位/g, '$1 ~ $2 欄位');

            // 處理 "K欄位" 格式
            formatted = formatted.replace(/([A-Z])欄位/g, '$1 欄位');

            return escapeHtml(formatted);
        }

        // 格式化值
        function formatValue(value) {
            if (Array.isArray(value)) {
                // 如果是陣列，顯示為標籤或列表
                if (value.length > 0 && typeof value[0] === 'object') {
                    // 物件陣列 - 每個物件顯示為一個卡片區塊
                    let listHtml = '<div class="config-object-list">';
                    value.forEach((v, index) => {
                        listHtml += `<div class="config-object-item">`;
                        // 每個屬性分行顯示
                        for (const [k, val] of Object.entries(v)) {
                            listHtml += `<div class="config-object-row"><span class="config-label">${formatKey(k)}:</span> <span class="config-value">${formatDisplayValue(val)}</span></div>`;
                        }
                        listHtml += `</div>`;
                    });
                    listHtml += '</div>';
                    return listHtml;
                }
                // 簡單陣列 - 顯示為標籤
                return value.map(v => `<code>${escapeHtml(String(v))}</code>`).join(' ');
            }
            if (typeof value === 'object' && value !== null) {
                // 物件 - 顯示為列表
                let listHtml = '<ul class="config-list">';
                for (const [k, v] of Object.entries(value)) {
                    if (typeof v === 'object' && v !== null) {
                        listHtml += `<li><strong>${formatKey(k)}:</strong> ${formatValue(v)}</li>`;
                    } else {
                        listHtml += `<li><strong>${formatKey(k)}:</strong> ${formatDisplayValue(v)}</li>`;
                    }
                }
                listHtml += '</ul>';
                return listHtml;
            }
            return formatDisplayValue(value);
        }

        // 關閉模態框
        function closeModal() {
            document.getElementById('rulesModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 點擊背景關閉
        document.getElementById('rulesModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ESC 關閉
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 顯示 Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${escapeHtml(message)}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // HTML 轉義
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
