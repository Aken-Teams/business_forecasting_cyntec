<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>規則管理 - FORECAST 數據處理系統</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo/forecast-analytics.png') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body {
            background: #e6e3de;
            min-height: 100vh;
        }

        .rules-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 頁面標題區 */
        .page-title-bar {
            background: white;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title-bar h2 {
            font-size: 1.3rem;
            color: #2c3e50;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title-bar h2 i {
            color: #e74c3c;
        }

        .btn-back {
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.4);
            color: white;
        }

        /* 說明區塊 */
        .info-banner {
            background: white;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.06);
            border-left: 4px solid #e74c3c;
        }

        .info-banner h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2c3e50;
        }

        .info-banner h3 i {
            color: #e74c3c;
        }

        .info-banner p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* 客戶卡片網格 */
        .customer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .customer-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            min-height: 280px;
        }

        .customer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .customer-card-header {
            padding: 25px;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .customer-card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            transform: rotate(30deg);
        }

        .customer-card.quanta .customer-card-header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .customer-card.pegatron .customer-card-header {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
        }

        .customer-card.default .customer-card-header {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        .customer-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .customer-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .customer-company {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .customer-card-body {
            padding: 20px 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .rule-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .rule-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rule-badge.erp {
            background: #e8f4fc;
            color: #2980b9;
        }

        .rule-badge.transit {
            background: #e8f8f0;
            color: #27ae60;
        }

        .rule-badge.forecast {
            background: #fce8e8;
            color: #c0392b;
        }

        .rule-badge i {
            font-size: 0.7rem;
        }

        .customer-card-footer {
            padding: 15px 25px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .view-rules-btn {
            color: #3498db;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .view-rules-btn:hover {
            color: #2980b9;
        }

        .rule-count {
            color: #888;
            font-size: 0.85rem;
        }

        /* 模態框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 0;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 16px 16px 0 0;
            height: 60px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: stretch;
        }

        .modal-header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 25px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .modal-header-title svg {
            width: 22px;
            height: 22px;
            fill: white;
            flex-shrink: 0;
        }

        .modal-close {
            width: 60px;
            height: 60px;
            border: none;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            transition: background 0.3s;
            border-radius: 0 16px 0 0;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .modal-body {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* 規則類別區塊 */
        .rule-category-section {
            margin-bottom: 30px;
        }

        .rule-category-section:last-child {
            margin-bottom: 0;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .category-icon.erp { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        .category-icon.transit { background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%); }
        .category-icon.forecast { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
        .category-icon.mapping { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); }
        .category-icon.cleanup { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); }

        .category-title {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .rule-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #3498db;
        }

        .rule-item.erp { border-left-color: #3498db; }
        .rule-item.transit { border-left-color: #27ae60; }
        .rule-item.forecast { border-left-color: #e74c3c; }
        .rule-item.mapping { border-left-color: #9b59b6; }
        .rule-item.cleanup { border-left-color: #f39c12; }

        .rule-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .rule-item-title {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1rem;
        }

        .rule-item-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .rule-item-status.active {
            background: #d4edda;
            color: #155724;
        }

        .rule-item-status.inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .rule-item-desc {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .rule-config-details {
            background: white;
            border-radius: 8px;
            padding: 15px;
        }

        .config-row {
            display: flex;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .config-row:last-child {
            margin-bottom: 0;
        }

        .config-label {
            font-weight: 600;
            color: #555;
            min-width: 120px;
        }

        .config-value {
            color: #333;
        }

        .config-value code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #c0392b;
        }

        /* Toast 通知 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success i { color: #27ae60; }
        .toast.error i { color: #e74c3c; }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #bc773e;
            font-size: 0.9rem;
            margin-top: 40px;
            border-top: 2px solid #d4cbc4;
        }

        /* 載入動畫 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .loading i {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .customer-grid {
                grid-template-columns: 1fr;
            }

            .page-title-bar {
                flex-direction: column;
                gap: 15px;
            }

            .modal-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="rules-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-logo">
                        <img src="{{ url_for('static', filename='logo/logo.png') }}" alt="FORECAST Logo" class="logo-image">
                    </div>
                    <div class="header-text">
                        <h1>處理規則管理</h1>
                        <p class="header-subtitle">管理各客戶的資料處理規則配置</p>
                    </div>
                </div>
                <div class="header-user">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span class="user-name">{{ user.display_name }}</span>
                        <span class="user-role">(管理者)</span>
                    </div>
                    <a href="/admin" class="logout-btn" style="background: #6c757d;">
                        <i class="fas fa-arrow-left"></i> 返回
                    </a>
                </div>
            </div>
        </header>

        <!-- 說明區塊 -->
        <div class="info-banner">
            <h3><i class="fas fa-info-circle"></i> 關於處理規則</h3>
            <p>此頁面顯示各客戶的資料處理規則配置。每位客戶可能有不同的 ERP 淨需求、在途資料處理方式，以及 Forecast 匹配邏輯。點擊客戶卡片可查看詳細的處理規則說明。</p>
        </div>

        <!-- 客戶卡片 -->
        <div id="customerContent">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>載入客戶資料中...</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2025 智合科技，FORECAST 數據處理系統. 智能預測，精準分析.</p>
        </footer>
    </div>

    <!-- 規則詳情模態框 -->
    <div class="modal-overlay" id="rulesModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-title">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    <span id="modalCustomerName">客戶規則</span>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 動態內容 -->
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 瀏覽器檢測腳本 -->
    <script src="{{ url_for('static', filename='js/browser-check.js') }}?v={{ version }}"></script>

    <script>
        let allRules = [];
        let customers = [];
        let customerRulesCache = {}; // 快取每個客戶的規則

        // 頁面載入
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });

        // 載入資料
        async function loadData() {
            try {
                // 載入客戶列表
                const customersRes = await fetch('/api/admin/users');
                const customersData = await customersRes.json();

                if (customersData.success) {
                    // 只取一般用戶（有處理規則的）
                    customers = customersData.users.filter(u => u.role === 'user');
                }

                // 載入所有規則（用於統計）
                const rulesRes = await fetch('/api/admin/rules');
                const rulesData = await rulesRes.json();
                if (rulesData.success) {
                    allRules = rulesData.rules;
                    // 按用戶分組規則數量
                    customers.forEach(c => {
                        c.ruleCount = allRules.filter(r => r.user_id === c.id).length;
                    });
                }

                renderCustomerCards();
            } catch (error) {
                console.error('載入失敗:', error);
                showToast('載入資料失敗', 'error');
            }
        }

        // 渲染客戶卡片
        function renderCustomerCards() {
            const container = document.getElementById('customerContent');

            if (customers.length === 0) {
                container.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-users" style="animation: none; color: #ddd;"></i>
                        <p>目前沒有客戶資料</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="customer-grid">';

            customers.forEach(customer => {
                const cardClass = getCustomerCardClass(customer.company);
                const ruleCount = customer.ruleCount || 0;
                const hasRules = ruleCount > 0;

                html += `
                    <div class="customer-card ${cardClass}" onclick="showCustomerRules(${customer.id}, '${escapeHtml(customer.display_name)}', '${escapeHtml(customer.company)}')">
                        <div class="customer-card-header">
                            <div class="customer-icon">
                                <i class="fas fa-building"></i>
                            </div>
                            <div class="customer-name">${escapeHtml(customer.display_name)}</div>
                            <div class="customer-company">${escapeHtml(customer.company || '未設定公司')}</div>
                        </div>
                        <div class="customer-card-body">
                            <div class="rule-summary">
                                ${hasRules ? `
                                    <span class="rule-badge erp"><i class="fas fa-circle"></i> ERP 處理</span>
                                    <span class="rule-badge transit"><i class="fas fa-circle"></i> 在途處理</span>
                                    <span class="rule-badge forecast"><i class="fas fa-circle"></i> Forecast</span>
                                ` : `
                                    <span style="color: #999; font-size: 0.9rem;">尚未設定處理規則</span>
                                `}
                            </div>
                        </div>
                        <div class="customer-card-footer">
                            <span class="view-rules-btn">
                                <i class="fas fa-eye"></i> ${hasRules ? '查看詳細規則' : '尚無規則'}
                            </span>
                            <span class="rule-count">${ruleCount} 項規則</span>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // 根據公司名稱決定卡片樣式
        function getCustomerCardClass(company) {
            if (!company) return 'default';
            const lower = company.toLowerCase();
            if (lower.includes('廣達') || lower.includes('quanta')) return 'quanta';
            if (lower.includes('和碩') || lower.includes('pegatron')) return 'pegatron';
            return 'default';
        }

        // 顯示客戶規則
        async function showCustomerRules(userId, customerName, company) {
            document.getElementById('modalCustomerName').textContent = `${customerName} - 處理規則`;
            document.getElementById('modalBody').innerHTML = `
                <div class="loading" style="padding: 40px;">
                    <i class="fas fa-spinner"></i>
                    <p>載入規則中...</p>
                </div>
            `;
            document.getElementById('rulesModal').classList.add('active');
            document.body.style.overflow = 'hidden';

            try {
                // 載入該客戶的規則
                const response = await fetch(`/api/admin/rules?user_id=${userId}`);
                const data = await response.json();

                if (!data.success) {
                    document.getElementById('modalBody').innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #e74c3c;">
                            <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                            <p>載入規則失敗: ${data.message}</p>
                        </div>
                    `;
                    return;
                }

                const customerRules = data.rules;

                if (customerRules.length === 0) {
                    document.getElementById('modalBody').innerHTML = `
                        <div style="text-align: center; padding: 60px; color: #888;">
                            <i class="fas fa-inbox" style="font-size: 4rem; margin-bottom: 20px; color: #ddd;"></i>
                            <h3 style="color: #666; margin-bottom: 10px;">尚未設定處理規則</h3>
                            <p>此客戶目前沒有任何處理規則配置</p>
                        </div>
                    `;
                    return;
                }

                // 按類別分組規則
                const categories = {
                    'erp': { name: 'ERP 淨需求處理', icon: 'database', rules: [] },
                    'transit': { name: '在途資料處理', icon: 'shipping-fast', rules: [] },
                    'forecast': { name: 'Forecast 處理', icon: 'chart-line', rules: [] },
                    'mapping': { name: '客戶映射規則', icon: 'project-diagram', rules: [] },
                    'cleanup': { name: '資料清理規則', icon: 'broom', rules: [] }
                };

                customerRules.forEach(rule => {
                    if (categories[rule.rule_category]) {
                        categories[rule.rule_category].rules.push(rule);
                    }
                });

                let html = '';
                for (const [key, category] of Object.entries(categories)) {
                    if (category.rules.length > 0) {
                        html += `
                            <div class="rule-category-section">
                                <div class="category-header">
                                    <div class="category-icon ${key}">
                                        <i class="fas fa-${category.icon}"></i>
                                    </div>
                                    <span class="category-title">${category.name}</span>
                                </div>
                        `;

                        category.rules.forEach(rule => {
                            html += renderRuleItem(rule);
                        });

                        html += '</div>';
                    }
                }

                document.getElementById('modalBody').innerHTML = html;

            } catch (error) {
                console.error('載入客戶規則失敗:', error);
                document.getElementById('modalBody').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #e74c3c;">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                        <p>載入規則失敗，請稍後再試</p>
                    </div>
                `;
            }
        }

        // 渲染規則項目
        function renderRuleItem(rule) {
            const config = rule.rule_config || {};
            let configHtml = renderConfigDetails(config);

            return `
                <div class="rule-item ${rule.rule_category}">
                    <div class="rule-item-header">
                        <span class="rule-item-title">${escapeHtml(rule.rule_name)}</span>
                        <span class="rule-item-status ${rule.is_active ? 'active' : 'inactive'}">
                            ${rule.is_active ? '啟用中' : '已停用'}
                        </span>
                    </div>
                    <div class="rule-item-desc">${escapeHtml(rule.rule_description || '')}</div>
                    <div class="rule-config-details">
                        ${configHtml}
                    </div>
                </div>
            `;
        }

        // 渲染配置詳情
        function renderConfigDetails(config) {
            if (!config || Object.keys(config).length === 0) {
                return '<p style="color: #999; margin: 0;">無詳細配置</p>';
            }

            let html = '';
            for (const [key, value] of Object.entries(config)) {
                html += `<div class="config-row">`;
                html += `<span class="config-label">${formatKey(key)}:</span>`;
                html += `<span class="config-value">${formatValue(value)}</span>`;
                html += `</div>`;
            }
            return html;
        }

        // 格式化鍵名
        function formatKey(key) {
            const keyMap = {
                'match_keys': '匹配欄位',
                'source_columns': '來源欄位',
                'description': '說明',
                'date_field': '日期欄位',
                'breakpoint_field': '斷點欄位',
                'default_breakpoint': '預設斷點',
                'eta_field': 'ETA 欄位',
                'default_eta': '預設 ETA',
                'week_calculation': '週期計算',
                'eta_formats': 'ETA 格式',
                'source_field': '來源欄位',
                'multiplier': '乘數',
                'example': '範例',
                'date_formats': '日期格式',
                'block_identification': '區塊識別',
                'data_range': '資料範圍',
                'column_finding': '欄位定位',
                'row_finding': '行定位',
                'accumulation_logic': '累加邏輯',
                'mapping_fields': '映射欄位',
                'unique_key': '唯一鍵',
                'cleanup_rules': '清理規則'
            };
            return keyMap[key] || key.replace(/_/g, ' ');
        }

        // 格式化值
        function formatValue(value) {
            if (Array.isArray(value)) {
                return value.map(v => {
                    if (typeof v === 'object') {
                        return Object.entries(v).map(([k, val]) => `${formatKey(k)}: ${val}`).join(', ');
                    }
                    return `<code>${escapeHtml(String(v))}</code>`;
                }).join(' / ');
            }
            if (typeof value === 'object' && value !== null) {
                return Object.entries(value).map(([k, v]) => {
                    if (typeof v === 'object') {
                        return `<strong>${formatKey(k)}:</strong> ${formatValue(v)}`;
                    }
                    return `<strong>${formatKey(k)}:</strong> ${escapeHtml(String(v))}`;
                }).join('<br>');
            }
            return escapeHtml(String(value));
        }

        // 關閉模態框
        function closeModal() {
            document.getElementById('rulesModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 點擊背景關閉
        document.getElementById('rulesModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ESC 關閉
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 顯示 Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${escapeHtml(message)}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // HTML 轉義
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
