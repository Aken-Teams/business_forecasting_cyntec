<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者介面 - FORECAST 數據處理系統</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo/forecast-analytics.png') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body {
            background: #e6e3de;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .admin-header {
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
            border-radius: 16px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .admin-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .admin-header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            text-align: right;
        }

        .user-info .user-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .user-info .user-role {
            background: rgba(255,255,255,0.25);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .user-info .user-role i {
            color: #f1c40f;
        }

        .btn-logout-header {
            background: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-logout-header:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: white;
            border-radius: 16px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .feature-card.test:hover { border-color: #27ae60; }
        .feature-card.logs:hover { border-color: #3498db; }
        .feature-card.users:hover { border-color: #e67e22; }
        .feature-card.mappings:hover { border-color: #9b59b6; }
        .feature-card.rules:hover { border-color: #e74c3c; }

        .feature-card .icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 1.8rem;
            color: white;
        }

        .feature-card.test .icon {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }

        .feature-card.logs .icon {
            background: linear-gradient(135deg, #3498db 0%, #5dade2 100%);
        }

        .feature-card.users .icon {
            background: linear-gradient(135deg, #e67e22 0%, #f39c12 100%);
        }

        .feature-card.mappings .icon {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        .feature-card.rules .icon {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .feature-card h3 {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .feature-card p {
            color: #7f8c8d;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .section-title {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 3px solid #9b59b6;
        }

        /* Footer 與一般用戶頁面一致 */
        .footer {
            text-align: center;
            padding: 30px 0;
            color: #bc773e;
            font-size: 0.9rem;
            margin-top: 40px;
            border-top: 2px solid #d4cbc4;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4cbc4, transparent);
        }

        @media (max-width: 768px) {
            .admin-header-content {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .header-right {
                flex-direction: column;
                gap: 15px;
            }

            .user-info {
                text-align: center;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-header-content">
                <div>
                    <h1><i class="fas fa-crown"></i> 管理者介面</h1>
                    <p>系統管理與監控中心</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-name">{{ user.display_name }}</div>
                        <span class="user-role">
                            <i class="fas fa-crown"></i> 管理者
                        </span>
                    </div>
                    <a href="/logout" class="btn-logout-header">
                        <i class="fas fa-sign-out-alt"></i> 登出
                    </a>
                </div>
            </div>
        </div>

        <h2 class="section-title">IT 功能</h2>
        <div class="feature-grid">
            <div class="feature-card test" onclick="location.href='/test_function'">
                <div class="icon">
                    <i class="fas fa-flask"></i>
                </div>
                <h3>測試功能</h3>
                <p>選擇客戶執行完整數據處理流程測試</p>
            </div>

            <div class="feature-card logs" onclick="location.href='/logs'">
                <div class="icon">
                    <i class="fas fa-file-alt"></i>
                </div>
                <h3>查看 LOG</h3>
                <p>檢視系統活動日誌、上傳與處理記錄</p>
            </div>
        </div>

        <h2 class="section-title">管理者專屬功能</h2>
        <div class="feature-grid">
            <div class="feature-card users" onclick="location.href='/users_manage'">
                <div class="icon">
                    <i class="fas fa-users-cog"></i>
                </div>
                <h3>用戶管理</h3>
                <p>查看所有用戶資料與登入狀態</p>
            </div>

            <div class="feature-card mappings" onclick="location.href='/mappings_view'">
                <div class="icon">
                    <i class="fas fa-project-diagram"></i>
                </div>
                <h3>客戶映射檢視</h3>
                <p>查看所有用戶的客戶映射配置</p>
            </div>

            <div class="feature-card rules" onclick="location.href='/rules'">
                <div class="icon">
                    <i class="fas fa-cogs"></i>
                </div>
                <h3>規則管理</h3>
                <p>查看與管理資料處理規則配置</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2025 智合科技，FORECAST 數據處理系統. 智能預測，精準分析.</p>
        </footer>
    </div>

    <!-- 瀏覽器檢測腳本 -->
    <script src="{{ url_for('static', filename='js/browser-check.js') }}?v={{ version }}"></script>
</body>
</html>
